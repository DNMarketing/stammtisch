<!DOCTYPE html>
<html lang="de">

<title>QR-Aufsteller A5 – D&N Marketing Stammtisch</title>
<style>
  @font-face { font-family: 'Poppins'; src: url('../fonts/poppins-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Poppins'; src: url('../fonts/poppins-600.woff2') format('woff2'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Poppins'; src: url('../fonts/poppins-800.woff2') format('woff2'); font-weight: 800; font-display: swap; }

  @page { size: A5 portrait; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 148mm; height: 210mm; }
  body {
    font-family: 'Poppins', -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: #0A1128;
    color: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    display: flex;
    flex-direction: column;
    padding: 12mm 12mm 10mm;
    position: relative;
    overflow: hidden;
  }
  /* Diagonale Akzentfläche unten – Visitenkarten-Motiv */
  .diag {
    position: absolute;
    left: -10mm; right: -10mm; bottom: -34mm;
    height: 52mm;
    background: #5B74F7;
    transform: rotate(-4deg);
  }
  .eyebrow {
    font-size: 8.5pt; font-weight: 600; letter-spacing: .22em;
    text-transform: uppercase; color: #93A0BE;
  }
  .logo { font-size: 17pt; font-weight: 800; margin-top: 2mm; }
  .logo .amp { color: #5B74F7; }
  .logo .sub { display: block; font-size: 8pt; font-weight: 600; color: #93A0BE; letter-spacing: .02em; }
  h1 {
    font-size: 30pt; font-weight: 800; line-height: 1.06;
    margin-top: 8mm; letter-spacing: -.01em;
  }
  h1 .accent { color: #5B74F7; }
  .steps { margin-top: 4mm; font-size: 10.5pt; font-weight: 600; color: #C6CEE4; }
  .steps span { color: #5B74F7; font-weight: 800; }
  .qrpanel {
    margin-top: 8mm;
    background: #fff; border-radius: 6mm;
    padding: 7mm 7mm 5mm;
    width: 96mm; align-self: center;
    text-align: center;
    position: relative; z-index: 2;
  }
  .qrpanel svg { width: 82mm; height: 82mm; display: block; margin: 0 auto; }
  .url {
    font-family: 'SF Mono', ui-monospace, 'Cascadia Code', Menlo, monospace;
    font-size: 8.5pt; color: #0A1128; margin-top: 2.5mm; font-weight: 600;
  }
  .footer {
    margin-top: auto; position: relative; z-index: 2;
    display: flex; justify-content: space-between; align-items: flex-end;
    color: #0A1128;
  }
  .claim { font-size: 11pt; font-weight: 800; }
  .site { font-size: 9pt; font-weight: 600; }
</style>
</head>
